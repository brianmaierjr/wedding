story:
  chapterLabel: "Chapter One"
  heading: "Our Story"
  body: |
    We met in the summer of 2024 on the pickleball court. What began as a friendly competition slowly developed into something much more.

    As we spent more time together, we discovered a shared love for adventure, food, and good coffee—exploring new cities on foot, by bike, or on scooters, trying new restaurants, and finding cute coffee shops in different towns.

    All these small adventures led to one of the biggest adventures yet. In the summer of 2025, after a beautiful week in Destin, Florida, Brian popped the question on the beach at sunset. Liz, of course, said yes, which brings us to where we are today.

    Now, we are embarking on the biggest adventure of them all: marriage. We look forward to the journey ahead as husband and wife and forever pickleball partners.
  imageAsset: "wedshots/our-story.jpg"
  imageAlt: "Our story together"
  highlights:
    - "🥒 From partners to soulmates"
    - "🏝️ Engaged at the beach"

